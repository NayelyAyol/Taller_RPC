syntax = "proto3";

service Calculadora{
    rpc Sumar (Operacion) returns (Resultado);
    rpc Restar (Operacion) returns (Resultado);
    rpc Multipicar (Operacion) returns (Resultado);
    rpc Dividir (Operacion) returns (Resultado);
}

message Operacion {
    int32 a = 1;
    int32 b = 2;
}

message Resultado {
    int32 r = 1;
}